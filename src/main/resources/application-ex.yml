cloudinary:
  cloud-name: xxxx
  api-key: xxxx
  api-secret: xxxxx

spring:
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: -1
  mail:
    host: smtp.gmail.com
    port: 587
    username: your_email@gmail.com
    password: your_app_password
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true